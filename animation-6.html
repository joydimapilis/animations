<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animation 6 Recreation</title>
  <style>
    :root {
      --duration: 8.283s;
      --ink: #15191a;
      --bg: #141b1b;
      --panel: #92aaad;
      --panel-light: #9cb5b8;
      --panel-soft: #a8bfc1;
      --cyan: #86fff0;
      --green: #caff88;
      --row: #b7c8ca;
      --muted: rgba(21, 25, 26, .28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #101515;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
    }

    .stage {
      position: relative;
      width: min(100vw, calc(100vh * 1.3516));
      aspect-ratio: 1284 / 950;
      overflow: hidden;
      background:
        radial-gradient(circle at 3% 8%, rgba(255,255,255,.035) 0 1px, transparent 1.7px) 0 0 / 18px 18px,
        radial-gradient(circle at 96% 1%, rgba(255,255,255,.05), transparent 12%),
        linear-gradient(180deg, #151c1c 0%, var(--bg) 62%, #111616 100%);
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.03);
      isolation: isolate;
    }

    .stage::before,
    .stage::after {
      content: "";
      position: absolute;
      border: 2px solid rgba(205, 223, 223, .12);
      border-radius: 28px;
      pointer-events: none;
    }

    .stage::before {
      inset: -22px -14px auto auto;
      width: 14%;
      height: 15%;
    }

    .stage::after {
      inset: auto -12px -18px -28px;
      height: 7%;
      border-radius: 50%;
      background: rgba(10, 16, 16, .35);
      filter: blur(1px);
    }

    .app {
      position: absolute;
      left: 6.75%;
      right: 6.55%;
      top: 28.95%;
      height: 72%;
    }

    .topbar {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 80px;
      background: var(--panel);
      border: 3px solid rgba(11, 18, 18, .9);
      border-radius: 17px;
      display: flex;
      align-items: center;
      padding: 0 32px 0 12px;
      box-shadow: 0 2px 0 rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.18);
    }

    .brand-mark {
      width: 54px;
      height: 54px;
      border-radius: 13px;
      background: linear-gradient(145deg, #182022, #263133);
      margin-right: 14px;
      position: relative;
      box-shadow: inset 0 -2px 0 rgba(255,255,255,.1), 0 1px 0 rgba(255,255,255,.14);
    }

    .brand-mark::before,
    .brand-mark::after {
      content: "";
      position: absolute;
      background: #67fff2;
      box-shadow: 0 0 12px rgba(103,255,242,.25);
    }

    .brand-mark::before {
      left: 12px;
      top: 12px;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      opacity: .95;
    }

    .brand-mark::after {
      right: 10px;
      bottom: 10px;
      width: 22px;
      height: 22px;
      border-radius: 6px;
      background: #cfff8f;
    }

    .brand {
      font-size: 29px;
      font-weight: 750;
      letter-spacing: 0;
    }

    .top-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 21px;
      color: rgba(20, 27, 28, .45);
      font-weight: 700;
      font-size: 28px;
    }

    .plus {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      border: 1.5px dashed rgba(20, 27, 28, .42);
      display: grid;
      place-items: center;
      font-weight: 300;
    }

    .shell {
      position: absolute;
      left: 0;
      right: 0;
      top: 84px;
      bottom: 0;
      display: grid;
      grid-template-columns: 82px 1fr;
    }

    .sidebar {
      background: var(--panel);
      border: 3px solid rgba(11, 18, 18, .9);
      border-radius: 16px 16px 0 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding-top: 35px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.16);
    }

    .nav-icon {
      width: 54px;
      height: 54px;
      border-radius: 13px;
      display: grid;
      place-items: center;
      color: rgba(27, 35, 36, .15);
      font-size: 27px;
      font-family: "Courier New", monospace;
      font-weight: 700;
    }

    .nav-icon.active {
      color: #15191a;
      background: rgba(255,255,255,.15);
      box-shadow: 0 2px 4px rgba(0,0,0,.08);
    }

    .content {
      position: relative;
      background: var(--panel);
      border: 3px solid rgba(11, 18, 18, .9);
      border-radius: 16px 16px 0 0;
      padding: 56px 66px;
      overflow: hidden;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.16);
    }

    .content-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 50px;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .add {
      border: 1px solid rgba(20,27,28,.16);
      border-radius: 12px;
      height: 44px;
      padding: 0 18px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,.08);
      font: 700 16px/1 "Courier New", monospace;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.2);
    }

    .upload {
      position: absolute;
      left: 7%;
      right: 6.2%;
      top: 184px;
      height: 405px;
      border: 3px dashed var(--cyan);
      border-radius: 23px;
      display: grid;
      place-items: center;
      opacity: 1;
      transition: background .18s ease, border-color .18s ease, box-shadow .18s ease, transform .18s ease;
    }

    .stage.dragging .upload {
      background: rgba(134, 255, 240, .05);
    }

    .stage.drop-ready .upload {
      border-color: #cfff8f;
      background: rgba(207, 255, 143, .12);
      box-shadow: inset 0 0 0 2px rgba(207,255,143,.18), 0 0 26px rgba(134,255,240,.12);
      transform: scale(1.01);
    }

    .stage.dropped .upload {
      animation: uploadFadeManual .85s linear forwards;
    }

    .upload-inner {
      transform: translateY(6px);
      text-align: center;
      font-family: "Courier New", monospace;
      font-weight: 800;
      font-size: 25px;
      letter-spacing: 0;
    }

    .cloud {
      position: relative;
      width: 86px;
      height: 44px;
      margin: 0 auto 28px;
    }

    .cloud span {
      position: absolute;
      bottom: 0;
      background: #171b1d;
      border-radius: 50%;
    }

    .cloud span:nth-child(1) { left: 5px; width: 38px; height: 34px; }
    .cloud span:nth-child(2) { left: 26px; width: 50px; height: 50px; }
    .cloud span:nth-child(3) { right: 1px; width: 42px; height: 40px; }

    .upload-arrow {
      color: var(--cyan);
      font-size: 27px;
      line-height: 1;
      margin-top: -18px;
      margin-bottom: 13px;
    }

    .table {
      position: absolute;
      inset: 167px 70px auto 78px;
      opacity: 0;
      filter: blur(4px);
      transform: translateY(20px);
    }

    .stage.dropped .table {
      animation: tableRevealManual 1s cubic-bezier(.22,.75,.2,1) .32s both;
    }

    .columns,
    .row {
      display: grid;
      grid-template-columns: 38% 22% 12% 22% 6%;
      align-items: center;
    }

    .columns {
      height: 44px;
      padding: 0 28px;
      font: 800 16px/1 "Courier New", monospace;
      color: rgba(20,27,28,.28);
      text-transform: uppercase;
    }

    .row {
      height: 80px;
      margin-top: 12px;
      padding: 0 24px;
      background: rgba(190, 205, 207, .56);
      border-radius: 14px;
      box-shadow: 0 5px 12px rgba(33,46,47,.12), inset 0 1px 0 rgba(255,255,255,.16);
      font: 800 16px/1 "Courier New", monospace;
      color: rgba(21, 25, 26, .92);
      opacity: 0;
      transform: translateY(24px);
    }

    .stage.dropped .row {
      animation: rowIn .75s cubic-bezier(.2,.75,.2,1) both;
      animation-delay: calc(var(--row-delay) + .66s);
    }

    .person {
      display: flex;
      align-items: center;
      gap: 22px;
    }

    .avatar {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: radial-gradient(circle at 50% 32%, #f5e3d7 0 22%, transparent 23%),
                  radial-gradient(circle at 50% 84%, var(--shirt) 0 36%, transparent 37%),
                  linear-gradient(135deg, #e9fbfa, #d7f2ef);
      box-shadow: inset 0 -7px 0 rgba(0,0,0,.08);
    }

    .avatar::before {
      content: "";
      width: 28px;
      height: 13px;
      border-radius: 50% 50% 35% 35%;
      background: var(--hair);
      transform: translateY(-11px) rotate(var(--tilt));
    }

    .tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 94px;
      height: 27px;
      padding: 0 12px;
      border-radius: 8px;
      background: var(--tag);
      color: rgba(20, 27, 28, .86);
      box-shadow: 0 0 12px color-mix(in srgb, var(--tag) 45%, transparent);
    }

    .chev {
      color: rgba(20,27,28,.28);
      font-size: 22px;
    }

    .wash {
      position: absolute;
      inset: 0;
      background: rgba(188, 210, 211, .48);
      opacity: 0;
      pointer-events: none;
      z-index: 3;
    }

    .stage.dropped .wash {
      animation: washManual 1.1s linear both;
    }

    .file {
      position: absolute;
      left: 70.2%;
      top: 3.65%;
      width: 124px;
      height: 156px;
      text-align: center;
      z-index: 7;
      transform-origin: 50% 35%;
      cursor: grab;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      transition: filter .14s ease;
      will-change: left, top, transform, opacity;
    }

    .file.dragging {
      cursor: grabbing;
      z-index: 30;
      filter: drop-shadow(0 16px 18px rgba(0,0,0,.22));
    }

    .file.dropped {
      pointer-events: none;
      animation: manualFileConsume .5s cubic-bezier(.2,.75,.22,1) forwards;
    }

    .file-card {
      width: 83px;
      height: 92px;
      margin: 0 auto 18px;
      border-radius: 12px;
      background: #dbe9ea;
      display: grid;
      place-items: center;
      box-shadow: 0 2px 0 rgba(0,0,0,.12), inset 0 1px 0 rgba(255,255,255,.5);
    }

    .excel {
      width: 57px;
      height: 48px;
      position: relative;
      border-radius: 3px;
      background: linear-gradient(90deg, #0d6e36 0 44%, #17a959 44% 68%, #0d8846 68% 100%);
      box-shadow: inset 18px 0 0 rgba(0,0,0,.2);
    }

    .excel::before {
      content: "X";
      position: absolute;
      left: -10px;
      top: 12px;
      width: 30px;
      height: 30px;
      border-radius: 3px;
      display: grid;
      place-items: center;
      background: #106b35;
      color: white;
      font: 800 20px/1 Arial, sans-serif;
      box-shadow: 1px 2px 2px rgba(0,0,0,.18);
    }

    .excel::after {
      content: "";
      position: absolute;
      inset: 6px 7px 6px 30px;
      background:
        linear-gradient(rgba(255,255,255,.23) 1px, transparent 1px) 0 0 / 100% 12px,
        linear-gradient(90deg, rgba(255,255,255,.2) 1px, transparent 1px) 0 0 / 15px 100%;
    }

    .file-name {
      color: white;
      font-size: 18px;
      font-weight: 800;
      line-height: 1;
      text-shadow: 0 2px 3px rgba(0,0,0,.45);
    }

    .cursor {
      position: absolute;
      width: 46px;
      height: 56px;
      z-index: 9;
      filter: drop-shadow(0 2px 1px rgba(0,0,0,.3));
      transform-origin: 20% 10%;
      clip-path: polygon(0 0, 86% 35%, 50% 46%, 73% 88%, 60% 96%, 37% 55%, 10% 82%);
    }

    .cursor.white {
      left: 51.6%;
      top: 8.3%;
      background: white;
      display: none;
    }

    .cursor.black {
      left: 43.5%;
      top: 4.75%;
      background: #111;
      outline: 2px solid #fff;
      display: none;
    }

    .grain {
      position: absolute;
      inset: 0;
      background-image: repeating-radial-gradient(circle at 20% 30%, rgba(255,255,255,.04) 0 1px, transparent 1px 3px);
      mix-blend-mode: soft-light;
      opacity: .25;
      pointer-events: none;
      z-index: 10;
    }

    @keyframes fileMove {
      0%, 12% { transform: translate(0, 0) scale(1); opacity: 1; }
      18% { transform: translate(-790px, 210px) scale(.86); }
      31% { transform: translate(-300px, 110px) scale(.88); }
      44% { transform: translate(-585px, 350px) scale(.9); }
      57% { transform: translate(-170px, 245px) scale(.9); }
      67% { transform: translate(-338px, 215px) scale(.96); opacity: 1; }
      72% { transform: translate(-354px, 305px) scale(.98); opacity: 1; }
      75% { transform: translate(-354px, 305px) scale(.86); opacity: .45; }
      82%, 100% { transform: translate(-354px, 305px) scale(.74); opacity: 0; }
    }

    @keyframes fileName {
      0%, 68% { opacity: 1; transform: translateY(0); }
      72% { opacity: .9; transform: translateY(6px); }
      80%, 100% { opacity: 0; transform: translateY(12px); }
    }

    @keyframes whiteCursor {
      0%, 10% { transform: translate(0, 0) rotate(-8deg); opacity: 1; }
      18% { transform: translate(-585px, 220px) rotate(-3deg); }
      31% { transform: translate(-110px, 120px) rotate(-4deg); }
      44% { transform: translate(-435px, 365px) rotate(-2deg); }
      57% { transform: translate(-2px, 256px) rotate(-2deg); }
      68% { transform: translate(-186px, 230px) rotate(-2deg); opacity: 1; }
      74% { transform: translate(-170px, 336px) rotate(-2deg); opacity: 1; }
      82%, 100% { transform: translate(-170px, 336px) rotate(-2deg); opacity: 0; }
    }

    @keyframes blackCursor {
      0% { transform: translate(0,0) rotate(-15deg); opacity: 1; }
      11% { transform: translate(-5px, 10px) rotate(-13deg); opacity: 1; }
      18% { transform: translate(-505px, 225px) rotate(-8deg); opacity: 0; }
      62% { transform: translate(20px, 265px) rotate(-4deg); opacity: 0; }
      68% { transform: translate(96px, 300px) rotate(-4deg); opacity: 1; }
      76% { transform: translate(82px, 370px) rotate(-3deg); opacity: 1; }
      83% { transform: translate(92px, 405px) rotate(-3deg); opacity: 1; }
      100% { transform: translate(94px, 405px) rotate(-3deg); opacity: 1; }
    }

    @keyframes uploadFade {
      0%, 69% { opacity: 1; filter: blur(0); transform: scale(1); }
      74% { opacity: .28; filter: blur(1px); transform: scale(.985); }
      79%, 100% { opacity: 0; filter: blur(4px); transform: scale(.97); }
    }

    @keyframes manualFileConsume {
      0% { opacity: 1; transform: scale(1); }
      45% { opacity: .65; transform: scale(.9); }
      100% { opacity: 0; transform: scale(.72); }
    }

    @keyframes uploadFadeManual {
      0% { opacity: 1; filter: blur(0); transform: scale(1.01); }
      45% { opacity: .3; filter: blur(1px); transform: scale(.99); }
      100% { opacity: 0; filter: blur(4px); transform: scale(.97); }
    }

    @keyframes washManual {
      0% { opacity: 0; }
      32% { opacity: .58; }
      100% { opacity: 0; }
    }

    @keyframes tableRevealManual {
      0% { opacity: 0; filter: blur(4px); transform: translateY(24px); }
      48% { opacity: .38; filter: blur(3px); transform: translateY(12px); }
      100% { opacity: 1; filter: blur(0); transform: translateY(0); }
    }

    @keyframes wash {
      0%, 68% { opacity: 0; }
      72% { opacity: .58; }
      82%, 100% { opacity: 0; }
    }

    @keyframes tableReveal {
      0%, 70% { opacity: 0; filter: blur(4px); transform: translateY(24px); }
      76% { opacity: .38; filter: blur(3px); transform: translateY(12px); }
      82%, 100% { opacity: 1; filter: blur(0); transform: translateY(0); }
    }

    @keyframes rowIn {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 760px) {
      .stage {
        width: 100vw;
      }
    }
  </style>
</head>
<body>
  <main class="stage" aria-label="Acme Corp customers CSV upload animation">
    <section class="app">
      <div class="topbar">
        <div class="brand-mark"></div>
        <div class="brand">Acme Corp</div>
        <div class="top-actions"><span class="plus">+</span><span>⋮</span></div>
      </div>

      <div class="shell">
        <aside class="sidebar">
          <div class="nav-icon">◇</div>
          <div class="nav-icon">▧</div>
          <div class="nav-icon active">♧</div>
          <div class="nav-icon">▤</div>
          <div class="nav-icon">♨</div>
        </aside>

        <div class="content">
          <div class="content-head">
            <h1>Customers</h1>
            <div class="add"><span>+</span><span>ADD SUBSCRIBERS</span></div>
          </div>

          <div class="upload">
            <div class="upload-inner">
              <div class="cloud"><span></span><span></span><span></span></div>
              <div class="upload-arrow">↑</div>
              <div>DRAG &amp; DROP YOUR FILE</div>
            </div>
          </div>

          <div class="table">
            <div class="columns">
              <span>NAME</span><span>TYPE</span><span>SUBS.</span><span>OVERDUE AMT</span><span></span>
            </div>
            <div class="row" style="--row-delay:0s">
              <div class="person"><span class="avatar" style="--hair:#53382f;--shirt:#db6c79;--tilt:12deg"></span><span>AALIYAH JOHNSON</span></div>
              <span class="tag" style="--tag:#cfff8f">RESIDENT</span><span>05</span><span>€18.00</span><span class="chev">⌄</span>
            </div>
            <div class="row" style="--row-delay:.06s">
              <div class="person"><span class="avatar" style="--hair:#282521;--shirt:#2b3035;--tilt:-14deg"></span><span>DONOVAN MAY</span></div>
              <span class="tag" style="--tag:#cfff8f">RESIDENT</span><span>08</span><span>€18.00</span><span class="chev">⌄</span>
            </div>
            <div class="row" style="--row-delay:.12s">
              <div class="person"><span class="avatar" style="--hair:#6d503d;--shirt:#313b45;--tilt:0deg"></span><span>LISA BUEHNER</span></div>
              <span class="tag" style="--tag:#8fffee">BUSSINESS</span><span>06</span><span>€85.00</span><span class="chev">⌄</span>
            </div>
            <div class="row" style="--row-delay:.18s">
              <div class="person"><span class="avatar" style="--hair:#2d2925;--shirt:#5b4c87;--tilt:4deg"></span><span>STEVE TURNER</span></div>
              <span class="tag" style="--tag:#8fffee">BUSSINESS</span><span>06</span><span>€1 385.00</span><span class="chev">⌄</span>
            </div>
            <div class="row" style="--row-delay:.24s">
              <div class="person"><span class="avatar" style="--hair:#5f392f;--shirt:#d86f65;--tilt:-8deg"></span><span>SAMANTHA RIVERS</span></div>
              <span class="tag" style="--tag:#cfff8f">RESIDENT</span><span>03</span><span>€18.00</span><span class="chev">⌄</span>
            </div>
          </div>

          <div class="wash"></div>
        </div>
      </div>
    </section>

    <div class="file" aria-hidden="true">
      <div class="file-card"><div class="excel"></div></div>
      <div class="file-name">Customers.csv</div>
    </div>

    <div class="cursor black" aria-hidden="true"></div>
    <div class="cursor white" aria-hidden="true"></div>
    <div class="grain" aria-hidden="true"></div>
  </main>

  <script>
    const stage = document.querySelector(".stage");
    const file = document.querySelector(".file");
    const upload = document.querySelector(".upload");
    let dragOffsetX = 0;
    let dragOffsetY = 0;
    let isDragging = false;

    function placeFileAtCurrentScreenPosition() {
      const stageRect = stage.getBoundingClientRect();
      const fileRect = file.getBoundingClientRect();
      file.style.left = `${fileRect.left - stageRect.left}px`;
      file.style.top = `${fileRect.top - stageRect.top}px`;
      file.style.transform = "none";
    }

    function pointerIsOverUpload(event) {
      const uploadRect = upload.getBoundingClientRect();
      return event.clientX >= uploadRect.left &&
        event.clientX <= uploadRect.right &&
        event.clientY >= uploadRect.top &&
        event.clientY <= uploadRect.bottom;
    }

    function resetDropAnimation() {
      stage.classList.remove("dropped");
      file.classList.remove("dropped");
      upload.style.animation = "none";
      void upload.offsetWidth;
      upload.style.animation = "";
    }

    file.addEventListener("pointerdown", (event) => {
      if (event.button !== undefined && event.button !== 0) return;
      event.preventDefault();
      resetDropAnimation();
      placeFileAtCurrentScreenPosition();

      const fileRect = file.getBoundingClientRect();
      dragOffsetX = event.clientX - fileRect.left;
      dragOffsetY = event.clientY - fileRect.top;
      isDragging = true;

      file.setPointerCapture(event.pointerId);
      stage.classList.add("dragging");
      file.classList.add("dragging");
    });

    file.addEventListener("pointermove", (event) => {
      if (!isDragging) return;
      const stageRect = stage.getBoundingClientRect();
      const nextLeft = event.clientX - stageRect.left - dragOffsetX;
      const nextTop = event.clientY - stageRect.top - dragOffsetY;
      file.style.left = `${nextLeft}px`;
      file.style.top = `${nextTop}px`;
      stage.classList.toggle("drop-ready", pointerIsOverUpload(event));
    });

    file.addEventListener("pointerup", (event) => {
      if (!isDragging) return;
      isDragging = false;
      file.releasePointerCapture(event.pointerId);
      file.classList.remove("dragging");
      stage.classList.remove("dragging");

      if (pointerIsOverUpload(event)) {
        stage.classList.remove("drop-ready");
        file.classList.add("dropped");
        stage.classList.add("dropped");
        return;
      }

      stage.classList.remove("drop-ready");
    });

    file.addEventListener("pointercancel", (event) => {
      if (!isDragging) return;
      isDragging = false;
      file.releasePointerCapture(event.pointerId);
      file.classList.remove("dragging");
      stage.classList.remove("dragging", "drop-ready");
    });
  </script>
</body>
</html>
