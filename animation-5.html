<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animation 5</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .stage-wrap {
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }

  .stage {
    width: 960px;
    height: 272px;
    background: #EDE8E0;
    position: absolute;
    top: 0; left: 0;
    overflow: hidden;
    transform-origin: top left;
    cursor: crosshair;
  }

  /* ── Rows ── */
  .row {
    position: absolute;
    left: 0; right: 0;
    display: flex;
    align-items: flex-start;
    gap: 0;
  }
  .row-top    { top: 0;    height: 146px; }
  .row-bottom { bottom: 0; height: 116px; align-items: flex-end; }

  .bar-col {
    flex-shrink: 0;
    display: flex;
    align-items: flex-start;
    height: 100%;
  }
  .row-bottom .bar-col { align-items: flex-end; }

  .bar {
    width: 100%;
    background: #111111;
    transition: background 0.1s ease;
  }
  .bar.accent-purple { background: #8B6BC4; }

  /* ── Orange cursor lines (one per section) ── */
  .cursor-line {
    position: absolute;
    width: 3px;
    background: #D4705A;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.12s ease;
    z-index: 8;
    transform: translateX(-50%);
  }
  .cursor-line.active { opacity: 1; }
  /* top line: confined to top row height (146px) */
  .cursor-line-top { top: 0; height: 146px; }
  /* bottom line: confined to bottom row height (116px) */
  .cursor-line-bot { bottom: 0; height: 116px; }

  /* ── Diagonal lines ── */
  .diag {
    position: absolute;
    width: 2px;
    background: #111111;
    border-radius: 1px;
    pointer-events: none;
  }
  .diag-tl {
    height: 76px;
    top: 12px;
    left: 98px;
    transform: rotate(28deg);
    transform-origin: top center;
  }
  .diag-br {
    height: 80px;
    bottom: 14px;
    right: 52px;
    transform: rotate(-22deg);
    transform-origin: bottom center;
  }

  /* ── Purple hover zones (wide invisible hit area over purple bars) ── */
  .purple-zone {
    position: absolute;
    top: 0; bottom: 0;
    width: 24px;
    transform: translateX(-50%);
    cursor: pointer;
    z-index: 6;
  }

  /* ── Cards ── */
  .card {
    position: absolute;
    background: #7B5EA7;
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 8px;
    line-height: 1.5;
    padding: 9px 11px;
    pointer-events: none;
    opacity: 0;
    transform: scaleY(0);
    transition: opacity 0.18s ease, transform 0.18s ease;
    z-index: 10;
    white-space: pre-wrap;
  }
  .card.visible {
    opacity: 1;
    transform: scaleY(1);
  }

  #card1 {
    top: 10px;
    width: 138px;
    transform-origin: top left;
  }
  #card2 {
    top: 10px;
    width: 138px;
    transform-origin: top left;
  }
  #card3 {
    bottom: 10px;
    width: 138px;
    transform-origin: bottom left;
  }
  #card3 { transform: scaleY(0); }
  #card3.visible { transform: scaleY(1); }

  .card-heading {
    font-size: 7px;
    line-height: 1.5;
    margin-bottom: 6px;
    opacity: 0.95;
  }

  .card-row {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-bottom: 3px;
  }
  .card-row .lbl {
    font-size: 6.5px;
    flex-shrink: 0;
    opacity: 0.9;
  }
  .card-row .seg {
    height: 3.5px;
    background: rgba(255,255,255,0.38);
    border-radius: 2px;
    flex: 1;
  }

  .card-lines { margin-top: 4px; }
  .card-lines .ln {
    height: 4px;
    background: rgba(255,255,255,0.35);
    border-radius: 2px;
    margin-bottom: 3px;
  }

  .card-footer {
    font-size: 6.5px;
    color: rgba(255,255,255,0.65);
    margin-top: 5px;
  }
</style>
</head>
<body>

<div class="stage-wrap" id="stageWrap">
<div class="stage" id="stage">

  <div class="row row-top"    id="rowTop"></div>
  <div class="row row-bottom" id="rowBottom"></div>

  <div class="diag diag-tl"></div>
  <div class="diag diag-br"></div>

  <!-- Orange cursor lines — one per section, strictly confined to its row -->
  <div class="cursor-line cursor-line-top" id="cursorLineTop"></div>
  <div class="cursor-line cursor-line-bot" id="cursorLineBot"></div>

  <!-- Card 1 — shown when hovering purple bar 1 (top ~33%) -->
  <div class="card" id="card1">
    <div class="card-heading">The firm has done&#10;the following&#10;similar deals:</div>
    <div class="card-row"><span class="lbl">[a]</span><div class="seg" style="max-width:62px"></div></div>
    <div class="card-row"><span class="lbl">[b]</span><div class="seg" style="max-width:52px"></div></div>
    <div class="card-row"><span class="lbl">[c]</span><div class="seg" style="max-width:38px"></div></div>
  </div>

  <!-- Card 2 — shown when hovering purple bar 2 (top ~66%) -->
  <div class="card" id="card2">
    <div class="card-heading">FIND RECENT MERGER&#10;AGREEMENTS IN PHARMA&#10;WHERE A&amp;B LLP HAS&#10;BEEN ON THE&#10;OPPOSING SIDE</div>
    <div class="card-row"><span class="lbl">[1]</span><div class="seg" style="max-width:72px"></div></div>
    <div class="card-row"><span class="lbl">[2]</span><div class="seg" style="max-width:58px"></div></div>
    <div class="card-row"><span class="lbl">[3]</span><div class="seg" style="max-width:48px"></div></div>
    <div class="card-row"><span class="lbl">[4]</span><div class="seg" style="max-width:32px"></div></div>
  </div>

  <!-- Card 3 — shown when hovering purple bar 3 (bottom ~22%) -->
  <div class="card" id="card3">
    <div class="card-heading">ONE FOR&#10;SMITH &amp; MILLER LLP?</div>
    <div class="card-lines">
      <div class="ln" style="width:90%"></div><div class="ln" style="width:72%"></div>
      <div class="ln" style="width:85%"></div><div class="ln" style="width:60%"></div>
      <div class="ln" style="width:78%"></div><div class="ln" style="width:55%"></div>
      <div class="ln" style="width:88%"></div><div class="ln" style="width:65%"></div>
      <div class="ln" style="width:50%"></div>
    </div>
    <div class="card-footer">· Creating summary</div>
  </div>

</div>
</div>

<script>
// ─── Seeded PRNG ────────────────────────────────────────────────────────────
function mkRand(seed) {
  return () => {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ─── Bar generation ─────────────────────────────────────────────────────────
const SW = 960, SH = 272;

function genBars(totalW, minH, maxH, seed) {
  const rand = mkRand(seed);
  const bars = [];
  let x = 0;
  while (x < totalW + 8) {
    const w   = Math.floor(rand() * 4) + 3;
    const h   = Math.floor(rand() * (maxH - minH + 1)) + minH;
    const gap = Math.floor(rand() * 3) + 2;
    bars.push({ w, h, gap });
    x += w + gap;
  }
  return bars;
}

const topBarData = genBars(SW, 55, 140, 42);
const botBarData = genBars(SW, 40, 110, 99);

// bar index at a given x-fraction of stage width
function barIdxAt(bars, frac) {
  const target = SW * frac;
  let x = 0;
  for (let i = 0; i < bars.length; i++) {
    x += bars[i].gap + bars[i].w / 2;
    if (x >= target) return i;
    x += bars[i].w / 2;
  }
  return bars.length - 1;
}

const topP1 = barIdxAt(topBarData, 0.33);
const topP2 = barIdxAt(topBarData, 0.66);
const botP1 = barIdxAt(botBarData, 0.22);

// ─── Build DOM grid ──────────────────────────────────────────────────────────
function buildGrid(containerId, barData, purpleIdxSet) {
  const container = document.getElementById(containerId);
  const els = [];
  const positions = []; // center-x of each bar column in design coords
  let x = 0;
  barData.forEach(({ w, h, gap }, i) => {
    x += gap;
    const col = document.createElement('div');
    col.className = 'bar-col';
    col.style.cssText = `width:${w}px;margin-left:${gap}px;flex-shrink:0;`;

    const bar = document.createElement('div');
    bar.className = 'bar' + (purpleIdxSet.has(i) ? ' accent-purple' : '');
    bar.style.cssText = `width:${w}px;height:${h}px;`;
    bar.dataset.def = purpleIdxSet.has(i) ? 'purple' : 'black';

    col.appendChild(bar);
    container.appendChild(col);
    els.push(bar);
    positions.push(x + w / 2);
    x += w;
  });
  return { els, positions };
}

const topGrid = buildGrid('rowTop',    topBarData, new Set([topP1, topP2]));
const botGrid = buildGrid('rowBottom', botBarData, new Set([botP1]));

// ─── Purple zones + card anchors ─────────────────────────────────────────────
const zones = [
  { stageX: topGrid.positions[topP1], cardId: 'card1' },
  { stageX: topGrid.positions[topP2], cardId: 'card2' },
  { stageX: botGrid.positions[botP1], cardId: 'card3' },
];

// Position the cards at their purple bar x-coord
// (offset left so the card doesn't clip the right edge)
const CARD_W = 138;
zones.forEach(({ stageX, cardId }) => {
  const card = document.getElementById(cardId);
  const leftX = Math.min(stageX - 4, SW - CARD_W - 4);
  card.style.left = Math.max(4, leftX) + 'px';
});

// ─── Invisible hover zones ────────────────────────────────────────────────────
zones.forEach(({ stageX, cardId, row }) => {
  const zone = document.createElement('div');
  zone.className = 'purple-zone';
  zone.style.left = stageX + 'px';
  document.getElementById('stage').appendChild(zone);

  zone.addEventListener('mouseenter', () => showCard(cardId));
  zone.addEventListener('mouseleave', () => hideCard(cardId));
});

function showCard(id) { document.getElementById(id).classList.add('visible'); }
function hideCard(id) { document.getElementById(id).classList.remove('visible'); }

// ─── Orange cursor lines (section-isolated) ──────────────────────────────────
const clTop     = document.getElementById('cursorLineTop');
const clBot     = document.getElementById('cursorLineBot');
const stageWrap = document.getElementById('stageWrap');
let idleTimer   = null;
let currentScale = 1;

// Stage is 272px tall; split exactly in half at 136px
const SECTION_SPLIT = SH / 2; // 136px

function clearLines() {
  clTop.classList.remove('active');
  clBot.classList.remove('active');
}

stageWrap.addEventListener('mousemove', (e) => {
  const rect  = stageWrap.getBoundingClientRect();
  const stageX = (e.clientX - rect.left) / currentScale;
  const stageY = (e.clientY - rect.top)  / currentScale;

  const inTop = stageY < SECTION_SPLIT;

  // Move both lines to the same X so switching sections is seamless
  clTop.style.left = stageX + 'px';
  clBot.style.left = stageX + 'px';

  // Activate only the line that belongs to the current section
  if (inTop) {
    clTop.classList.add('active');
    clBot.classList.remove('active');
  } else {
    clBot.classList.add('active');
    clTop.classList.remove('active');
  }

  clearTimeout(idleTimer);
  idleTimer = setTimeout(clearLines, 500);
});

stageWrap.addEventListener('mouseleave', () => {
  clearTimeout(idleTimer);
  clearLines();
});

// ─── Responsive scaling ───────────────────────────────────────────────────────
function scaleStage() {
  const vw = window.innerWidth, vh = window.innerHeight;
  currentScale = Math.min(vw / SW, vh / SH);
  document.getElementById('stage').style.transform = `scale(${currentScale})`;
  stageWrap.style.width  = Math.round(SW * currentScale) + 'px';
  stageWrap.style.height = Math.round(SH * currentScale) + 'px';
}
scaleStage();
window.addEventListener('resize', scaleStage);
</script>
</body>
</html>
